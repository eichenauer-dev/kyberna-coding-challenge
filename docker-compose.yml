services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      APP_ENV: dev
    env_file:
      - .env.dev
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    ports:
      - "3306:3306"
    env_file:
      - .env.dev
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mariadb_data:
